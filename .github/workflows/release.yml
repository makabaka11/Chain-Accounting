name: Release Android APK

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check commit message for version
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -oP '\d+\.\d+\.\d+' | head -1; then
            VERSION=$(echo "$MSG" | grep -oP '\d+\.\d+\.\d+' | head -1)
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected version: $VERSION"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No version detected in commit message"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=upload" >> android/key.properties
          echo "storeFile=app/upload-keystore.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Save split APKs
        run: |
          mkdir -p /tmp/apks
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk /tmp/apks/
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk /tmp/apks/
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk /tmp/apks/

      - name: Build universal APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Collect all APKs
        run: |
          mkdir -p release
          cp /tmp/apks/*.apk release/
          cp build/app/outputs/flutter-apk/app-release.apk release/app-universal-release.apk
          ls -lh release/

      - name: Read release notes
        id: notes
        run: |
          if [ -f release_log.md ]; then
            CONTENT=$(cat release_log.md)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$CONTENT" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release v${{ needs.check-version.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            release/app-universal-release.apk
            release/app-arm64-v8a-release.apk
            release/app-armeabi-v7a-release.apk
            release/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
